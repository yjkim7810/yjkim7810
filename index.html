<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Crypto Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        table { margin: 0 auto; border-collapse: collapse; width: 50%; max-width: 600px; }
        th, td { padding: 15px; border: 1px solid #ddd; }
        th { background-color: #f4f4f4; }
        .update-time { font-size: 0.9em; color: gray; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>💰 Real-time Crypto Dashboard</h1>
    <p>Data is automatically fetched using the CoinGecko API.</p>

    <table>
        <thead>
            <tr>
                <th>Coin</th>
                <th>Symbol</th>
                <th>Current Price (USD)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Bitcoin</td>
                <td>BTC</td>
                <td id="btc-price">Loading...</td>
            </tr>
            <tr>
                <td>Ethereum</td>
                <td>ETH</td>
                <td id="eth-price">Loading...</td>
            </tr>
        </tbody>
    </table>

    <div class="update-time" id="last-updated">Last updated: Waiting...</div>

    <script>
        // Function to fetch prices from CoinGecko API
        async function fetchCryptoPrices() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd');
                const data = await response.json();

                // Update the table with fetched data
                document.getElementById('btc-price').innerText = '$' + data.bitcoin.usd.toLocaleString();
                document.getElementById('eth-price').innerText = '$' + data.ethereum.usd.toLocaleString();

                // Show the last updated time
                const now = new Date();
                document.getElementById('last-updated').innerText = 'Last updated: ' + now.toLocaleTimeString();
            } catch (error) {
                console.error('Failed to fetch data:', error);
                document.getElementById('last-updated').innerText = 'Data update failed';
            }
        }

        // Run immediately when the page loads
        fetchCryptoPrices();

        // Auto-update every 10 seconds (10000 milliseconds)
        setInterval(fetchCryptoPrices, 10000);
    </
